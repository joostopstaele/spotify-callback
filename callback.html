<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Login Callback</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0a;
      color: #1DB954;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 1rem;
    }
    h1 { font-size: 1.2rem; color: #fff; }
    p { font-size: 0.85rem; color: #888; }
    .token-box {
      background: #111;
      border: 1px solid #1DB954;
      border-radius: 8px;
      padding: 1rem 1.5rem;
      max-width: 90vw;
      word-break: break-all;
      font-size: 0.75rem;
      color: #1DB954;
      display: none;
    }
    .copy-btn {
      background: #1DB954;
      color: #000;
      border: none;
      padding: 0.6rem 1.5rem;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.9rem;
      display: none;
    }
    .copy-btn:hover { background: #1ed760; }
    .error { color: #e74c3c; }
  </style>
</head>
<body>
  <h1>🎵 Spotify Dashboard</h1>
  <p id="status">Bezig met verwerken...</p>
  <div class="token-box" id="tokenBox"></div>
  <button class="copy-btn" id="copyBtn" onclick="copyToken()">📋 Kopieer token</button>
  <p id="instructions"></p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.substring(1));

    const code = params.get('code');
    const error = params.get('error') || hashParams.get('error');
    const accessToken = hashParams.get('access_token');

    const statusEl = document.getElementById('status');
    const tokenBox = document.getElementById('tokenBox');
    const copyBtn = document.getElementById('copyBtn');
    const instructions = document.getElementById('instructions');

    if (error) {
      statusEl.textContent = '❌ Fout bij inloggen: ' + error;
      statusEl.classList.add('error');
    } else if (code) {
      statusEl.textContent = '✅ Login geslaagd! Kopieer de volledige URL hieronder.';
      tokenBox.style.display = 'block';
      tokenBox.textContent = window.location.href;
      copyBtn.style.display = 'inline-block';
      copyBtn.textContent = '📋 Kopieer volledige URL';
      copyBtn.onclick = () => {
        navigator.clipboard.writeText(window.location.href);
        copyBtn.textContent = '✅ Gekopieerd!';
      };
      instructions.textContent = 'Plak deze URL in het Spotify Dashboard in Claude.';
    } else if (accessToken) {
      statusEl.textContent = '✅ Login geslaagd!';
      tokenBox.style.display = 'block';
      tokenBox.textContent = accessToken;
      copyBtn.style.display = 'inline-block';
      copyBtn.onclick = () => {
        navigator.clipboard.writeText(accessToken);
        copyBtn.textContent = '✅ Gekopieerd!';
      };
      instructions.textContent = 'Plak dit token in het Spotify Dashboard in Claude.';
    } else {
      statusEl.textContent = '⚠️ Geen token ontvangen. Probeer opnieuw in te loggen.';
    }
  </script>
</body>
</html>
